services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: novel
      POSTGRES_PASSWORD: novel
      POSTGRES_DB: novel_agent
    volumes:
      - novel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U novel -d novel_agent"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql+asyncpg://novel:novel@db:5432/novel_agent
      ALEMBIC_SYNC_URL: postgresql+psycopg://novel:novel@db:5432/novel_agent
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-bge-m3}
      OLLAMA_EMBED_BATCH_SIZE: ${OLLAMA_EMBED_BATCH_SIZE:-32}
      RAG_RECENT_FULL_EPISODES: ${RAG_RECENT_FULL_EPISODES:-3}
      SUMMARY_MAX_CHARS: ${SUMMARY_MAX_CHARS:-300}
      CORS_ALLOW_ORIGINS: "${CORS_ALLOW_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173}"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  novel_pgdata:
